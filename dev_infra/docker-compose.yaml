services:
  tor-1:
    container_name: tor-1
    image: pickapp/tor-proxy:0.4.7.13
    environment:
      - IP_CHANGE_SECONDS=15
    ports:
      - 8000:8888
    restart: unless-stopped

  tor-2:
    container_name: tor-2
    image: pickapp/tor-proxy:0.4.7.13
    environment:
      - IP_CHANGE_SECONDS=15
    ports:
      - 8888:8888
    restart: unless-stopped
